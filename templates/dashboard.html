<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>COMMAND ALKON Survey Caller</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #eef3f9 0%, #f8fafc 100%);
      color: #14213d;
    }

    .container {
      max-width: 1220px;
      margin: 36px auto;
      background: #ffffff;
      border-radius: 22px;
      box-shadow: 0 18px 45px rgba(0, 24, 54, 0.12);
      overflow: hidden;
    }

    .header {
      background: #ffffff;
      padding: 28px 32px;
      border-bottom: 1px solid #e8edf5;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .logo-wrap {
      background: #ffffff;
      padding: 10px 14px;
      border-radius: 16px;
      border: 1px solid #edf2f7;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-wrap img {
      height: 72px;
      width: auto;
      display: block;
    }

    .header-text h1 {
      margin: 0;
      font-size: 30px;
      color: #002b54;
      line-height: 1.1;
    }

    .header-text p {
      margin: 8px 0 0;
      color: #516074;
      font-size: 15px;
    }

    .content {
      padding: 30px;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e7edf4;
      border-radius: 18px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 8px 20px rgba(14, 31, 53, 0.05);
    }

    .card h2 {
      margin-top: 0;
      margin-bottom: 18px;
      color: #002b54;
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    input {
      flex: 1;
      min-width: 250px;
      padding: 15px 16px;
      border: 1px solid #cfd8e3;
      border-radius: 12px;
      font-size: 16px;
      outline: none;
    }

    input:focus {
      border-color: #002b54;
      box-shadow: 0 0 0 4px rgba(0, 43, 84, 0.08);
    }

    button, a.btn {
      background: #002b54;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px 18px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      font-size: 15px;
      font-weight: 600;
    }

    button.secondary, a.secondary {
      background: #eef3f8;
      color: #002b54;
    }

    #status {
      margin-top: 16px;
      font-weight: 600;
      color: #1c3557;
    }

    .table-wrap {
      overflow-x: auto;
      margin-top: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      text-align: left;
      padding: 12px;
      border-bottom: 1px solid #e8edf4;
      font-size: 14px;
      vertical-align: top;
    }

    th {
      background: #f4f8fc;
      color: #002b54;
      position: sticky;
      top: 0;
    }

    .hint {
      margin-top: 8px;
      color: #67778d;
      font-size: 13px;
    }

    audio {
      width: 220px;
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        align-items: flex-start;
      }

      .logo-wrap img {
        height: 58px;
      }

      .header-text h1 {
        font-size: 24px;
      }

      audio {
        width: 180px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo-wrap">
        <img src="/static/logo.png" alt="COMMAND ALKON Logo">
      </div>
      <div class="header-text">
        <h1>COMMAND ALKON Survey Caller</h1>
        <p>Outbound voice survey dashboard</p>
      </div>
    </div>

    <div class="content">
      <div class="card">
        <h2>Make a Call</h2>
        <div class="row">
          <input id="phoneNumber" type="text" placeholder="Enter phone number. Example: 573001112233" />
          <button onclick="startCall()">Call Now</button>
          <a class="btn secondary" href="/download-results">Export CSV</a>
        </div>
        <div class="hint">Use country code without spaces. Example: 573001112233</div>
        <div id="status"></div>
      </div>

      <div class="card">
        <h2>Survey Results</h2>
        <div class="row">
          <button class="secondary" onclick="loadResults()">Refresh Results</button>
        </div>

        <div class="table-wrap">
          <table id="resultsTable">
            <thead>
              <tr>
                <th>Date</th>
                <th>To</th>
                <th>Question 1</th>
                <th>Question 2</th>
                <th>Question 3</th>
                <th>Short Notes</th>
                <th>Recording</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    async function startCall() {
      const phone = document.getElementById("phoneNumber").value.trim();
      const status = document.getElementById("status");

      if (!phone) {
        status.textContent = "Please enter a phone number.";
        return;
      }

      status.textContent = "Starting call...";

      try {
        const response = await fetch(`/call/${encodeURIComponent(phone)}`);
        const data = await response.json();

        if (data.error) {
          status.textContent = "Error: " + data.error;
        } else {
          status.textContent = `Call started to ${data.to}`;
        }
      } catch (error) {
        status.textContent = "Unexpected error starting the call.";
      }
    }

    async function loadResults() {
      const tbody = document.querySelector("#resultsTable tbody");
      tbody.innerHTML = "";

      try {
        const response = await fetch("/results-json");
        const rows = await response.json();

        rows.reverse().forEach(row => {
          const recordingCell = row.recording_url
            ? `<audio controls preload="none" src="${row.recording_url}"></audio>`
            : "";

          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${row.timestamp_utc || ""}</td>
            <td>${row.to_number || ""}</td>
            <td>${row.question_1 || ""}</td>
            <td>${row.question_2 || ""}</td>
            <td>${row.question_3 || ""}</td>
            <td>${row.short_notes || ""}</td>
            <td>${recordingCell}</td>
          `;
          tbody.appendChild(tr);
        });
      } catch (error) {
        console.error(error);
      }
    }

    loadResults();
  </script>
</body>
</html>
