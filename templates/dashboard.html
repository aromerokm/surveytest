<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>COMMAND ALKON Survey Caller</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #1b1f23;
    }
    .container {
      max-width: 1100px;
      margin: 40px auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    .header {
      background: #002b54;
      color: white;
      padding: 32px;
    }
    .header h1 {
      margin: 0;
      font-size: 28px;
    }
    .header p {
      margin-top: 8px;
      opacity: 0.9;
    }
    .content {
      padding: 32px;
    }
    .card {
      background: #f9fbfd;
      border: 1px solid #e3e8ef;
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    input {
      flex: 1;
      min-width: 240px;
      padding: 14px;
      border: 1px solid #cfd7e3;
      border-radius: 10px;
      font-size: 16px;
    }
    button, a.btn {
      background: #002b54;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 14px 18px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      font-size: 15px;
    }
    button.secondary, a.secondary {
      background: #e8eef6;
      color: #002b54;
    }
    #status {
      margin-top: 14px;
      font-weight: bold;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      overflow: hidden;
    }
    th, td {
      text-align: left;
      padding: 12px;
      border-bottom: 1px solid #e9edf3;
      font-size: 14px;
      vertical-align: top;
    }
    th {
      background: #f2f6fb;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>COMMAND ALKON Survey Caller</h1>
      <p>Outbound voice survey dashboard</p>
    </div>

    <div class="content">
      <div class="card">
        <h2>Make a Call</h2>
        <div class="row">
          <input id="phoneNumber" type="text" placeholder="Enter phone number. Example: 573001112233" />
          <button onclick="startCall()">Call Now</button>
          <a class="btn secondary" href="/download-results">Export CSV</a>
        </div>
        <div id="status"></div>
      </div>

      <div class="card">
        <h2>Survey Results</h2>
        <button class="secondary" onclick="loadResults()">Refresh Results</button>
        <div style="margin-top: 16px; overflow-x:auto;">
          <table id="resultsTable">
            <thead>
              <tr>
                <th>Date</th>
                <th>To</th>
                <th>Question 1</th>
                <th>Question 2</th>
                <th>Question 3</th>
                <th>Short Notes</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    async function startCall() {
      const phone = document.getElementById("phoneNumber").value.trim();
      const status = document.getElementById("status");

      if (!phone) {
        status.textContent = "Please enter a phone number.";
        return;
      }

      status.textContent = "Starting call...";

      try {
        const response = await fetch(`/call/${encodeURIComponent(phone)}`);
        const data = await response.json();

        if (data.error) {
          status.textContent = "Error: " + data.error;
        } else {
          status.textContent = `Call started to ${data.to}`;
        }
      } catch (error) {
        status.textContent = "Unexpected error starting the call.";
      }
    }

    async function loadResults() {
      const tbody = document.querySelector("#resultsTable tbody");
      tbody.innerHTML = "";

      try {
        const response = await fetch("/results-json");
        const rows = await response.json();

        rows.reverse().forEach(row => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${row.timestamp_utc || ""}</td>
            <td>${row.to_number || ""}</td>
            <td>${row.question_1 || ""}</td>
            <td>${row.question_2 || ""}</td>
            <td>${row.question_3 || ""}</td>
            <td>${row.short_notes || ""}</td>
          `;
          tbody.appendChild(tr);
        });
      } catch (error) {
        console.error(error);
      }
    }

    loadResults();
  </script>
</body>
</html>
